services:
  db:
    image: postgres:15
    container_name: quid-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: quid
      POSTGRES_PASSWORD: quid
      POSTGRES_DB: quid_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
